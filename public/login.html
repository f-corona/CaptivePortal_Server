<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Guest - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <h1>Accedi al Wi-Fi</h1>
        <p>Presenta la tua credenziale BCWallet</p>
        <div id="qrcode">Caricamento QR...</div>
        <div id="status" class="status">In attesa di scansione...</div>
    </div>

    <script>
        async function caricaLogin() {
    const res = await fetch('/connect');
    const data = await res.json();
    const connId = data.connectionId;
    document.getElementById('qrcode').innerHTML = `<img src="${data.qrCodeDataUrl}" width="300">`;

    //una sola chiamata, aspetta la risposta
    const vRes = await fetch('/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ connectionId: connId })
    });
    const vData = await vRes.json();
    if(vData.ok) {
        document.getElementById('status').innerHTML = "<span class='ok'>Accesso Autorizzato! Reindirizzamento...</span>";
        setTimeout(() => window.location.href = "http://google.com", 2000);
    }
}

caricaLogin();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Guest - Registrazione</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <!-- LOGO: sostituire con il logo dell'azienda/ente -->
        <img class="logo-header" src="/images/logo_standard.png" alt="Logo">
        <h1>Registrazione Wi-Fi</h1>

        <div class="card">
            <h3>1. Ricevi il codice</h3>
            <input type="email" id="email" placeholder="Inserisci la tua email" autocomplete="off">
            <button id="btnInviaEmail" onclick="inviaEmail()">Invia Codice</button>
            <div id="msgEmail"></div>
        </div>

        <div class="card">
            <h3>2. Verifica e ottieni credenziale</h3>
            <input type="text" id="otp" placeholder="Codice a 6 cifre" autocomplete="off">
            <button onclick="verificaOTP()">Verifica Codice</button>
            <div id="msgOTP"></div>
            <div id="qrcode"></div>
            <div id="msgIssue" class="ok"></div>
        </div>

        <div class="card card-alt">
            <p>Hai già la credenziale?</p>
            <button class="btn-success" onclick="window.location.href='/login'">Accedi Ora</button>
        </div>

        <!-- BANNER: sostituire con il banner pubblicitario/sponsor -->
        <img class="banner-footer" src="/images/LogoUniversitàDiSalerno.jpg" alt="Banner">
    </div>

    <script>
        let userEmail = '';
        let connId = '';

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('email').value = '';
            document.getElementById('otp').value = '';
        });

        function avviaCooldown() {
            const btn = document.getElementById('btnInviaEmail');
            let secondi = 20;
            btn.disabled = true;
            btn.textContent = 'Riprova tra ' + secondi + 's';
            const timer = setInterval(function() {
                secondi--;
                if (secondi <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = 'Invia Codice';
                } else {
                    btn.textContent = 'Riprova tra ' + secondi + 's';
                }
            }, 1000);
        }

        async function inviaEmail() {
            userEmail = document.getElementById('email').value;
            const res = await fetch('/email/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail })
            });
            const data = await res.json();
            document.getElementById('msgEmail').innerText = data.ok ? "Email inviata!" : "Errore.";
            if (data.ok) avviaCooldown();
        }

        async function verificaOTP() {
    const otp = document.getElementById('otp').value;
    const res = await fetch('/email/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email: userEmail, otp: otp })
    });
    const data = await res.json();
    if(data.ok) {
        connId = data.connectionId;
        document.getElementById('qrcode').innerHTML = `<img src="${data.qrCodeDataUrl}" width="250">`;
        document.getElementById('msgOTP').innerText = "Scansiona con BCWallet!";

        //una sola chiamata, aspetta la risposta
        const issueRes = await fetch('/issue', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ connectionId: connId, email: userEmail })
        });
        const issueData = await issueRes.json();
        if (issueData.ok) {
            document.getElementById('msgIssue').innerHTML = "Credenziale emessa! <br><b>Ora puoi andare alla pagina di login.</b>";
            document.getElementById('qrcode').innerHTML = "";
        }
    }
}

    </script>
</body>
</html>
